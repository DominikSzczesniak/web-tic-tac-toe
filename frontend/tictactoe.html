<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="tictactoe.css">
</head>

<body>
<h1>Tic Tac Toe</h1>

<button type="button" id="prepareGameBtn" onclick="prepareGame()">Prepare Game</button>

<form id="queueForm">
    <input type="text" id="usernameInput" name="usernameInput" placeholder="Enter your name" required>
    <button type="button" onclick="queueForGame()">Queue up</button>
</form>

<div id="boardContainer"></div>
<div class="box" id="queueBox">In Queue...</div>

<div id="playerToMove"></div>
<div id="playerThatWon"></div>

<script src="tictactoe.js"></script>
</body>
</html>
